<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trevo AI | Enterprise Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F1F5F9; color: #0F172A; overflow: hidden; }
        html[dir="rtl"] body { font-family: 'Cairo', sans-serif; }
        
        .trevo-gradient { background: linear-gradient(135deg, #1A3A6C 0%, #0F172A 100%); }
        .trevo-orange { background-color: #F5A623; }
        .text-trevo-orange { color: #F5A623; }
        
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .sidebar-item-active { background: rgba(245, 166, 35, 0.1); color: #F5A623; border-right: 4px solid #F5A623; }
        
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Configuration
        const isLocal = window.location.hostname === "127.0.0.1" || window.location.hostname === "localhost";
        const API_BASE_URL = isLocal ? "http://127.0.0.1:5000" : "https://trevo-ai-tourism-tools.onrender.com";

        function App() {
            // App State
            const [activeMenu, setActiveMenu] = useState(() => localStorage.getItem('tv_menu') || "dashboard");
            const [lang, setLang] = useState(() => localStorage.getItem('tv_lang') || "en");
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [engineStatus, setEngineStatus] = useState("checking");

            // Data State (حفظ البيانات لعدم ضياعها عند التنقل)
            const [location, setLocation] = useState(() => localStorage.getItem('tv_loc') || "Aswan, Egypt");
            const [audience, setAudience] = useState(() => localStorage.getItem('tv_aud') || "High Net Worth Individuals");
            const [aiContent, setAiContent] = useState(() => localStorage.getItem('tv_content') || "");
            const [cost, setCost] = useState(() => localStorage.getItem('tv_cost') || "2000");
            const [revenue, setRevenue] = useState(() => localStorage.getItem('tv_rev') || "15000");
            const [roiResult, setRoiResult] = useState(() => localStorage.getItem('tv_roi') || "0");
            
            const [isGenerating, setIsGenerating] = useState(false);
            const [vrActive, setVrActive] = useState(false);

            // Sync with LocalStorage
            useEffect(() => {
                localStorage.setItem('tv_menu', activeMenu);
                localStorage.setItem('tv_lang', lang);
                localStorage.setItem('tv_loc', location);
                localStorage.setItem('tv_aud', audience);
                localStorage.setItem('tv_content', aiContent);
                localStorage.setItem('tv_cost', cost);
                localStorage.setItem('tv_rev', revenue);
                localStorage.setItem('tv_roi', roiResult);
                document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            }, [activeMenu, lang, location, audience, aiContent, cost, revenue, roiResult]);

            // Heartbeat check
            useEffect(() => {
                fetch(`${API_BASE_URL}/api/status`).then(r => r.json())
                .then(() => setEngineStatus("online")).catch(() => setEngineStatus("offline"));
            }, []);

            // Functions
            const handleGenerate = async (style) => {
                setIsGenerating(true);
                setAiContent(lang === 'ar' ? "...جاري المعالجة" : "Generating...");
                try {
                    const res = await fetch(`${API_BASE_URL}/api/generate-ai-content`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ location, style, audience })
                    });
                    const data = await res.json();
                    setAiContent(data.copy || data.content);
                } catch (e) { setAiContent("Error connecting to server."); }
                finally { setIsGenerating(false); }
            };

            const calculateROI = () => {
                const c = parseFloat(cost) || 1;
                const r = parseFloat(revenue) || 0;
                const roi = (((r - c) / c) * 100).toFixed(1);
                setRoiResult(roi);
            };

            // Components
            const Logo = ({ size = "md" }) => (
                <div 
                    onClick={() => window.location.href = 'index.html'} 
                    className="flex items-center gap-3 cursor-pointer group"
                >
                    <div className={`${size === 'lg' ? 'w-12 h-12' : 'w-10 h-10'} bg-[#F5A623] rounded-xl flex items-center justify-center shadow-lg group-hover:rotate-6 transition-transform`}>
                        <span className="text-white font-black text-xl">T</span>
                    </div>
                    <div className="leading-tight">
                        <h1 className="text-white font-black text-lg tracking-tight">Trevo <span className="text-[#F5A623]">AI</span></h1>
                        <p className="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Enterprise OS</p>
                    </div>
                </div>
            );

            const Sidebar = () => (
                <aside className={`fixed inset-y-0 z-50 w-72 trevo-gradient text-white transform transition-transform duration-300 md:relative md:translate-x-0 ${isMobileMenuOpen ? 'translate-x-0' : (lang === 'ar' ? 'translate-x-full' : '-translate-x-full')}`}>
                    <div className="p-8 border-b border-white/10">
                        <Logo />
                    </div>
                    <nav className="mt-6 px-4 space-y-2">
                        {[
                            { id: 'dashboard', icon: 'ph-squares-four', label: lang === 'ar' ? 'لوحة التحكم' : 'Dashboard' },
                            { id: 'ai-lab', icon: 'ph-magic-wand', label: lang === 'ar' ? 'مختبر الذكاء' : 'AI Content Lab' },
                            { id: 'geovr', icon: 'ph-virtual-reality', label: lang === 'ar' ? 'الواقع الافتراضي' : 'GeoVR Engine' },
                            { id: 'analytics', icon: 'ph-chart-line-up', label: lang === 'ar' ? 'تحليل العوائد' : 'ROI Analytics' },
                            { id: 'settings', icon: 'ph-gear', label: lang === 'ar' ? 'الإعدادات' : 'System Settings' }
                        ].map(item => (
                            <button 
                                key={item.id}
                                onClick={() => { setActiveMenu(item.id); setIsMobileMenuOpen(false); }}
                                className={`w-full flex items-center gap-4 p-4 rounded-xl font-bold transition-all ${activeMenu === item.id ? 'sidebar-item-active' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}
                            >
                                <i className={`ph-fill ${item.icon} text-xl`}></i>
                                {item.label}
                            </button>
                        ))}
                    </nav>
                    <div className="absolute bottom-8 left-8 right-8 p-4 bg-white/5 rounded-2xl border border-white/10">
                        <div className="flex items-center gap-2 mb-2">
                            <div className={`w-2 h-2 rounded-full ${engineStatus === 'online' ? 'bg-green-500 animate-pulse' : 'bg-red-500'}`}></div>
                            <span className="text-[10px] font-bold uppercase opacity-60">Server {engineStatus}</span>
                        </div>
                        <p className="text-[10px] text-slate-400">v1.2.0 Build Stable</p>
                    </div>
                </aside>
            );

            return (
                <div className="flex h-screen overflow-hidden">
                    <Sidebar />
                    
                    <main className="flex-1 flex flex-col min-w-0 bg-[#F8FAFC] overflow-y-auto">
                        {/* Header */}
                        <header className="h-20 bg-white border-b border-slate-200 px-6 md:px-10 flex items-center justify-between sticky top-0 z-40">
                            <button onClick={() => setIsMobileMenuOpen(true)} className="md:hidden p-2 text-slate-600">
                                <i className="ph-bold ph-list text-2xl"></i>
                            </button>
                            
                            <h2 className="text-xl font-black text-[#1A3A6C] hidden md:block">
                                {activeMenu.replace('-', ' ').toUpperCase()}
                            </h2>

                            <div className="flex items-center gap-4">
                                <button onClick={() => setLang(lang === 'en' ? 'ar' : 'en')} className="px-4 py-2 bg-slate-100 rounded-lg text-sm font-bold border border-slate-200">
                                    {lang === 'ar' ? 'English' : 'العربية'}
                                </button>
                                <div className="flex items-center gap-3 pl-4 border-l border-slate-200">
                                    <div className="text-right hidden sm:block">
                                        <p className="text-sm font-bold">Sherif Almeidany</p>
                                        <p className="text-[10px] font-bold text-[#F5A623]">ADMIN PRO</p>
                                    </div>
                                    <div className="w-10 h-10 bg-[#1A3A6C] rounded-full flex items-center justify-center text-white font-bold">SM</div>
                                </div>
                            </div>
                        </header>

                        {/* Page Content */}
                        <div className="p-4 md:p-10">
                            {activeMenu === 'dashboard' && (
                                <div className="fade-in space-y-8">
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <div className="p-6 bg-white rounded-3xl border border-slate-200 shadow-sm">
                                            <i className="ph-fill ph-rocket-launch text-3xl text-[#F5A623] mb-4"></i>
                                            <h3 className="text-slate-500 font-bold text-xs uppercase mb-1">Active Campaigns</h3>
                                            <p className="text-3xl font-black text-[#1A3A6C]">12</p>
                                        </div>
                                        <div className="p-6 bg-white rounded-3xl border border-slate-200 shadow-sm">
                                            <i className="ph-fill ph-chart-pie text-3xl text-green-500 mb-4"></i>
                                            <h3 className="text-slate-500 font-bold text-xs uppercase mb-1">Total ROI (Avg)</h3>
                                            <p className="text-3xl font-black text-[#1A3A6C]">{roiResult}%</p>
                                        </div>
                                        <div className="p-6 bg-white rounded-3xl border border-slate-200 shadow-sm">
                                            <i className="ph-fill ph-users-three text-3xl text-blue-500 mb-4"></i>
                                            <h3 className="text-slate-500 font-bold text-xs uppercase mb-1">Total Audience</h3>
                                            <p className="text-3xl font-black text-[#1A3A6C]">84.2k</p>
                                        </div>
                                    </div>
                                    <div className="bg-[#1A3A6C] rounded-[40px] p-10 text-white flex flex-col md:flex-row items-center justify-between gap-10">
                                        <div className="max-w-md">
                                            <h2 className="text-4xl font-black mb-4">{lang === 'ar' ? 'مرحباً شريف!' : 'Welcome, Sherif!'}</h2>
                                            <p className="opacity-70 font-medium">{lang === 'ar' ? 'محرك تريفو للذكاء الاصطناعي جاهز للعمل. ابدأ بتوليد حملتك القادمة.' : 'Trevo Engine is primed and ready. Start generating your next high-converting campaign.'}</p>
                                            <button onClick={() => setActiveMenu('ai-lab')} className="mt-8 px-8 py-4 bg-[#F5A623] rounded-2xl font-black text-white hover:scale-105 transition-transform">
                                                {lang === 'ar' ? 'ابدأ الآن' : 'Get Started'}
                                            </button>
                                        </div>
                                        <div className="w-full max-w-sm h-64 bg-white/5 rounded-3xl border border-white/10 flex items-center justify-center">
                                            <i className="ph ph-cpu text-9xl opacity-20"></i>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeMenu === 'ai-lab' && (
                                <div className="fade-in glass-card rounded-[32px] p-8 md:p-12 shadow-xl border border-white">
                                    <h2 className="text-3xl font-black text-[#1A3A6C] mb-8 flex items-center gap-3">
                                        <i className="ph-fill ph-magic-wand text-[#F5A623]"></i> AI Content Lab
                                    </h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
                                        <div className="space-y-2">
                                            <label className="text-xs font-black uppercase text-slate-400">Destination</label>
                                            <input type="text" value={location} onChange={e => setLocation(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold focus:border-[#F5A623] outline-none" />
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-xs font-black uppercase text-slate-400">Target Audience</label>
                                            <select value={audience} onChange={e => setAudience(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold outline-none">
                                                <option>High Net Worth Individuals</option>
                                                <option>Adventure Backpackers</option>
                                                <option>Families</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div className="flex flex-wrap gap-4 mb-10 border-b border-slate-100 pb-10">
                                        <button onClick={() => handleGenerate('luxury')} disabled={isGenerating} className="px-8 py-4 bg-[#1A3A6C] text-white rounded-2xl font-bold hover:bg-[#F5A623] transition-all disabled:opacity-50">Luxury Style</button>
                                        <button onClick={() => handleGenerate('adventure')} disabled={isGenerating} className="px-8 py-4 bg-slate-200 rounded-2xl font-bold hover:bg-slate-300 transition-all disabled:opacity-50">Adventure</button>
                                        <button onClick={() => handleGenerate('budget')} disabled={isGenerating} className="px-8 py-4 bg-slate-200 rounded-2xl font-bold hover:bg-slate-300 transition-all disabled:opacity-50">Budget</button>
                                    </div>
                                    {aiContent && (
                                        <div className="p-8 bg-orange-50 border-2 border-dashed border-[#F5A623] rounded-3xl">
                                            <p className="text-xl font-medium text-slate-800 italic leading-relaxed">"{aiContent}"</p>
                                        </div>
                                    )}
                                </div>
                            )}

                            {activeMenu === 'geovr' && (
                                <div className="fade-in space-y-6">
                                    <div className="bg-slate-900 rounded-[32px] p-10 h-[500px] flex flex-col items-center justify-center text-center overflow-hidden relative">
                                        {!vrActive ? (
                                            <div className="z-10">
                                                <div className="w-24 h-24 bg-[#F5A623] rounded-full mx-auto mb-6 flex items-center justify-center animate-bounce shadow-lg shadow-orange-500/20">
                                                    <i className="ph-fill ph-virtual-reality text-5xl text-white"></i>
                                                </div>
                                                <h2 className="text-3xl font-black text-white mb-2">GeoVR Rendering Ready</h2>
                                                <p className="text-slate-400 mb-8">Coordinates Locked for {location}</p>
                                                <button onClick={() => setVrActive(true)} className="px-10 py-5 bg-white text-[#1A3A6C] font-black rounded-2xl hover:scale-105 transition-all">Launch 360 Experience</button>
                                            </div>
                                        ) : (
                                            <div className="absolute inset-0 w-full h-full">
                                                <a-scene embedded style={{height: '100%', width: '100%'}}>
                                                    <a-sky src="https://aframe.io/aframe/examples/boilerplate/panorama/puydesancy.jpg" rotation="0 -130 0"></a-sky>
                                                </a-scene>
                                                <button onClick={() => setVrActive(false)} className="absolute top-6 right-6 z-[999] bg-red-500 text-white px-4 py-2 rounded-xl font-bold">Exit Engine</button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {activeMenu === 'analytics' && (
                                <div className="fade-in grid grid-cols-1 md:grid-cols-2 gap-10">
                                    <div className="glass-card p-10 rounded-[32px] shadow-sm">
                                        <h2 className="text-2xl font-black mb-8">ROI Calculator</h2>
                                        <div className="space-y-6">
                                            <div className="space-y-2">
                                                <label className="text-xs font-black uppercase opacity-40">Ad Spend (Investment)</label>
                                                <input type="number" value={cost} onChange={e => setCost(e.target.value)} className="w-full p-5 bg-slate-50 border rounded-2xl font-bold outline-none" />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-xs font-black uppercase opacity-40">Generated Revenue</label>
                                                <input type="number" value={revenue} onChange={e => setRevenue(e.target.value)} className="w-full p-5 bg-slate-50 border rounded-2xl font-bold outline-none" />
                                            </div>
                                            <button onClick={calculateROI} className="w-full py-5 bg-[#1A3A6C] text-white font-black rounded-2xl hover:bg-[#F5A623] transition-colors">Sync Analytics</button>
                                        </div>
                                    </div>
                                    <div className="bg-[#1A3A6C] p-12 rounded-[32px] text-white text-center flex flex-col justify-center">
                                        <p className="text-slate-400 font-bold uppercase tracking-widest text-sm mb-4">Projected Profitability</p>
                                        <h2 className="text-8xl font-black text-[#F5A623]">{roiResult}%</h2>
                                        <div className="mt-10 h-2 bg-white/10 rounded-full overflow-hidden">
                                            <div className="h-full bg-[#F5A623]" style={{ width: `${Math.min(roiResult, 100)}%` }}></div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeMenu === 'settings' && (
                                <div className="fade-in glass-card rounded-[32px] p-10 shadow-sm max-w-2xl">
                                    <h2 className="text-2xl font-black mb-10">System Preferences</h2>
                                    <div className="space-y-4">
                                        <div className="flex items-center justify-between p-6 bg-slate-50 rounded-2xl border">
                                            <div className="flex items-center gap-4">
                                                <div className="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center text-blue-600"><i className="ph-fill ph-globe text-2xl"></i></div>
                                                <div><p className="font-bold">API Region</p><p className="text-xs text-slate-500">Global (Auto-Detect)</p></div>
                                            </div>
                                            <span className="text-xs font-black text-slate-300">SERVER-LIVE</span>
                                        </div>
                                        <div className="flex items-center justify-between p-6 bg-slate-50 rounded-2xl border">
                                            <div className="flex items-center gap-4">
                                                <div className="w-12 h-12 bg-orange-100 rounded-xl flex items-center justify-center text-orange-600"><i className="ph-fill ph-translate text-2xl"></i></div>
                                                <div><p className="font-bold">Interface Language</p><p className="text-xs text-slate-500">English / Arabic</p></div>
                                            </div>
                                            <button onClick={() => setLang(lang === 'en' ? 'ar' : 'en')} className="px-4 py-2 bg-white border rounded-lg font-bold text-xs uppercase">Switch</button>
                                        </div>
                                        <div className="p-6 bg-red-50 rounded-2xl border border-red-100 mt-10">
                                            <p className="text-red-600 font-black mb-2 uppercase text-xs">Danger Zone</p>
                                            <button onClick={() => { localStorage.clear(); window.location.reload(); }} className="px-6 py-3 bg-red-600 text-white rounded-xl font-bold text-xs">Reset All Engine Data</button>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
