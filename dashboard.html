<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trevo AI | Enterprise Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <!-- مكتبة الجولات الافتراضية A-Frame -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; color: #1E293B; }
        html[dir="rtl"] body { font-family: 'Cairo', sans-serif; }
        .bg-trevo-blue { background-color: #1A3A6C; }
        .text-trevo-blue { color: #1A3A6C; }
        .text-trevo-orange { color: #F5A623; }
        .bg-trevo-orange { background-color: #F5A623; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .bar-transition { transition: height 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        /* ستايل مخصص لحاوية الـ VR لضمان ظهورها داخل الداشبورد */
        #vr-frame { width: 100%; height: 500px; border-radius: 24px; overflow: hidden; position: relative; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- التحديث الذكي للروابط ---
        const isLocal = window.location.hostname === "127.0.0.1" || window.location.hostname === "localhost";
        const API_BASE_URL = isLocal 
            ? "http://127.0.0.1:5000/api" 
            : "https://trevo-ai-tourism-tools.onrender.com/api";

        function App() {
            const [lang, setLang] = useState(() => localStorage.getItem('tv_lang') || "en");
            const [engineStatus, setEngineStatus] = useState("checking");
            const [activeMenu, setActiveMenu] = useState(() => localStorage.getItem('tv_menu') || "dashboard");
            const [location, setLocation] = useState(() => localStorage.getItem('tv_loc') || "Aswan, Egypt");
            const [audience, setAudience] = useState(() => localStorage.getItem('tv_aud') || "High Net Worth Individuals");
            const [cost, setCost] = useState(() => localStorage.getItem('tv_cost') || 2000);
            const [revenue, setRevenue] = useState(() => localStorage.getItem('tv_rev') || 15000);
            const [aiContent, setAiContent] = useState(() => localStorage.getItem('tv_content') || "");
            const [roiResult, setRoiResult] = useState(() => localStorage.getItem('tv_roi') || null);
            const [isExporting, setIsExporting] = useState(false);
            
            // حالات محرك GeoVR
            const [vrActive, setVrActive] = useState(false);
            const [vrImage, setVrImage] = useState("");

            useEffect(() => {
                document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
                localStorage.setItem('tv_lang', lang);
            }, [lang]);

            useEffect(() => {
                fetch(`${API_BASE_URL}/status`)
                    .then(r => r.json())
                    .then(() => setEngineStatus("online"))
                    .catch(() => setEngineStatus("offline"));
                calculateROI(); 
            }, []);

            const generateContent = async (style) => {
                const res = await fetch(`${API_BASE_URL}/generate-ai-content`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ location, style, audience })
                });
                const data = await res.json();
                setAiContent(data.copy);
            };

            const calculateROI = () => {
                const c = parseFloat(cost) || 1;
                const r = parseFloat(revenue) || 0;
                const localRoi = (((r - c) / c) * 100).toFixed(1);
                setRoiResult(localRoi);
            };

            // دالة تشغيل الجولة الافتراضية
            const startVrTour = async () => {
                // ملاحظة: ستحتاج لإضافة مسار /api/geovr/lookup في ملف Flask لديك
                try {
                    const res = await fetch(`${API_BASE_URL}/geovr/lookup`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ location })
                    });
                    const data = await res.json();
                    setVrImage(data.vr_image_url);
                    setVrActive(true);
                } catch (e) {
                    // في حالة عدم وجود المسار بعد، سنستخدم صورة افتراضية للتجربة
                    setVrImage("https://aframe.io/aframe/examples/boilerplate/panorama/puydesancy.jpg");
                    setVrActive(true);
                }
            };

            const menuItems = [
                { id: "dashboard", icon: "ph-squares-four", labelEn: "Dashboard", labelAr: "الرئيسية" },
                { id: "ai-lab", icon: "ph-magic-wand", labelEn: "AI Content Lab", labelAr: "مختبر المحتوى (AI)" },
                { id: "geovr", icon: "ph-virtual-reality", labelEn: "GeoVR Engine", labelAr: "محرك الواقع الافتراضي" },
                { id: "analytics", icon: "ph-chart-line-up", labelEn: "ROI Analytics", labelAr: "تحليل العوائد (ROI)" },
                { id: "settings", icon: "ph-gear", labelEn: "System Settings", labelAr: "إعدادات النظام" }
            ];

            const renderContent = () => {
                switch(activeMenu) {
                    case "dashboard":
                    case "ai-lab":
                        return (
                            <div className="bg-white rounded-3xl p-10 shadow-sm border border-slate-200 min-h-[60vh] fade-in">
                                <h2 className="text-3xl font-black text-trevo-blue mb-4 flex items-center gap-3">
                                    <i className="ph-fill ph-magic-wand text-trevo-orange"></i> 
                                    {lang === 'ar' ? 'مختبر المحتوى (الذكاء الاصطناعي)' : 'Advanced AI Content Lab'}
                                </h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-2">{lang === 'ar' ? 'الوجهة السياحية' : 'Primary Destination'}</label>
                                        <input type="text" value={location} onChange={(e) => setLocation(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-bold text-lg outline-none focus:border-trevo-orange" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-2">{lang === 'ar' ? 'الجمهور المستهدف' : 'Target Audience'}</label>
                                        <select value={audience} onChange={(e) => setAudience(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700 text-lg outline-none">
                                            <option value="High Net Worth Individuals">{lang === 'ar' ? 'أصحاب الثروات (VIP)' : 'High Net Worth Individuals'}</option>
                                            <option value="Adventure Backpackers">{lang === 'ar' ? 'عشاق المغامرة والسفاري' : 'Adventure Backpackers'}</option>
                                            <option value="Family Vacationers">{lang === 'ar' ? 'العائلات والأطفال' : 'Family Vacationers'}</option>
                                        </select>
                                    </div>
                                </div>
                                <div className="flex flex-wrap gap-4 mb-10 border-b border-slate-200 pb-10">
                                    <button onClick={() => generateContent('luxury')} className="px-8 py-4 bg-trevo-blue text-white rounded-xl font-bold hover:bg-blue-900 transition-colors">{lang === 'ar' ? 'توليد محتوى فاخر' : 'Generate Luxury'}</button>
                                    <button onClick={() => generateContent('adventure')} className="px-8 py-4 bg-slate-100 text-slate-700 rounded-xl font-bold hover:bg-slate-200 transition-colors">{lang === 'ar' ? 'توليد محتوى مغامرات' : 'Generate Adventure'}</button>
                                </div>
                                {aiContent && <div className="p-8 border-2 border-dashed border-trevo-orange bg-orange-50 rounded-2xl"><p className="text-2xl font-medium text-slate-800 italic leading-relaxed">"{aiContent}"</p></div>}
                            </div>
                        );

                    case "geovr":
                        return (
                            <div className="bg-slate-900 rounded-3xl p-10 shadow-xl border border-slate-800 text-white min-h-[60vh] flex flex-col items-center justify-center fade-in">
                                {!vrActive ? (
                                    <div className="text-center">
                                        <div className="w-24 h-24 bg-trevo-orange rounded-full mb-6 mx-auto flex items-center justify-center animate-pulse shadow-[0_0_40px_rgba(245,166,35,0.4)]">
                                            <i className="ph-fill ph-virtual-reality text-5xl text-white"></i>
                                        </div>
                                        <h2 className="text-4xl font-black mb-4">{lang === 'ar' ? 'محرك GeoVR جاهز' : 'GeoVR Engine Ready'}</h2>
                                        <p className="text-slate-400 mb-8">{lang === 'ar' ? 'هل أنت جاهز لاستكشاف' : 'Ready to explore'} {location} {lang === 'ar' ? 'بتقنية 360 درجة؟' : 'in 360°?'}</p>
                                        <button onClick={startVrTour} className="px-10 py-5 bg-trevo-orange text-white font-black rounded-2xl hover:scale-105 transition-transform">
                                            {lang === 'ar' ? 'ابدأ الجولة الافتراضية' : 'Start Virtual Tour'}
                                        </button>
                                    </div>
                                ) : (
                                    <div className="w-full h-full relative">
                                        <div id="vr-frame">
                                            <a-scene embedded style={{height: '500px', width: '100%'}}>
                                                <a-sky src={vrImage} rotation="0 -130 0"></a-sky>
                                            </a-scene>
                                        </div>
                                        <button onClick={() => setVrActive(false)} className="absolute top-4 right-4 z-50 bg-red-500 text-white px-4 py-2 rounded-lg font-bold">
                                            {lang === 'ar' ? 'إغلاق الجولة' : 'Exit Tour'}
                                        </button>
                                    </div>
                                )}
                            </div>
                        );
                    
                    case "analytics":
                        // ... كود الـ ROI الحالي الخاص بك ...
                        return (
                            <div className="bg-white rounded-3xl p-10 shadow-sm border border-slate-200 min-h-[60vh] fade-in">
                                <h2 className="text-3xl font-black text-trevo-blue mb-8 flex items-center gap-3"><i className="ph-fill ph-chart-line-up text-trevo-orange"></i> ROI Analytics</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="p-6 bg-slate-50 rounded-2xl border">
                                        <label className="block text-xs font-bold text-slate-500 mb-2 uppercase">Cost ($)</label>
                                        <input type="number" value={cost} onChange={(e) => setCost(e.target.value)} onKeyUp={calculateROI} className="w-full p-4 border rounded-xl font-bold text-xl" />
                                    </div>
                                    <div className="p-6 bg-slate-50 rounded-2xl border">
                                        <label className="block text-xs font-bold text-slate-500 mb-2 uppercase">Revenue ($)</label>
                                        <input type="number" value={revenue} onChange={(e) => setRevenue(e.target.value)} onKeyUp={calculateROI} className="w-full p-4 border rounded-xl font-bold text-xl" />
                                    </div>
                                </div>
                                <div className="mt-10 p-10 bg-trevo-blue text-white rounded-3xl text-center">
                                    <p className="text-slate-300 font-bold uppercase tracking-widest text-sm mb-2">Calculated ROI</p>
                                    <p className="text-7xl font-black text-trevo-orange">{roiResult}%</p>
                                </div>
                            </div>
                        );

                    case "settings":
                        return (
                            <div className="bg-white rounded-3xl p-10 shadow-sm border border-slate-200 min-h-[60vh] fade-in">
                                <h2 className="text-3xl font-black text-trevo-blue mb-8">System Settings</h2>
                                <div className={`inline-flex items-center gap-3 px-6 py-3 rounded-xl font-bold ${engineStatus === 'online' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                    <div className={`w-3 h-3 rounded-full ${engineStatus === 'online' ? 'bg-green-500 animate-pulse' : 'bg-red-500'}`}></div>
                                    Engine: {engineStatus.toUpperCase()}
                                </div>
                                <p className="mt-4 text-slate-500 italic">Connecting to: {API_BASE_URL}</p>
                            </div>
                        );
                    default: return null;
                }
            };

            return (
                <div className="flex min-h-screen">
                    <aside className="w-72 bg-trevo-blue text-white flex flex-col shadow-2xl z-10 sticky top-0 h-screen">
                        <div className="p-8 flex items-center gap-4 border-b border-white/10">
                            <div className="w-12 h-12 bg-trevo-orange rounded-xl flex items-center justify-center shadow-lg"><span className="text-2xl font-black text-white">T</span></div>
                            <div><h1 className="text-2xl font-black tracking-tight">Trevo AI</h1><p className="text-[10px] text-trevo-orange font-bold uppercase tracking-widest">Enterprise OS</p></div>
                        </div>
                        <nav className="flex-1 p-4 space-y-2 mt-4">
                            {menuItems.map(item => (
                                <button key={item.id} onClick={() => {setActiveMenu(item.id); setVrActive(false);}} className={`w-full flex items-center gap-4 p-4 rounded-2xl font-bold transition-all ${activeMenu === item.id ? 'bg-white/10 text-trevo-orange' : 'text-slate-300 hover:bg-white/5 hover:text-white'}`}>
                                    <i className={`ph-fill ${item.icon} text-xl`}></i> {lang === 'ar' ? item.labelAr : item.labelEn}
                                </button>
                            ))}
                        </nav>
                    </aside>
                    <main className="flex-1 flex flex-col bg-[#F8FAFC]">
                        <header className="bg-white px-10 py-6 border-b border-slate-200 flex justify-between items-center sticky top-0 z-20 shadow-sm">
                            <h2 className="text-2xl font-black text-trevo-blue capitalize">{activeMenu.replace('-', ' ')}</h2>
                            <button onClick={() => setLang(lang === 'en' ? 'ar' : 'en')} className="px-4 py-2 bg-slate-100 text-slate-700 font-bold rounded-xl border hover:bg-slate-200 transition-colors">
                                {lang === 'en' ? 'العربية' : 'English'}
                            </button>
                        </header>
                        <div className="p-10">{renderContent()}</div>
                    </main>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
