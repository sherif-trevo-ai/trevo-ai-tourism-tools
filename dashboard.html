<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trevo AI | Enterprise Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; color: #1E293B; overflow-x: hidden; }
        html[dir="rtl"] body { font-family: 'Cairo', sans-serif; }
        .bg-trevo-blue { background-color: #1A3A6C; }
        .text-trevo-blue { color: #1A3A6C; }
        .text-trevo-orange { color: #F5A623; }
        .bg-trevo-orange { background-color: #F5A623; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .bar-transition { transition: height 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        #vr-frame { width: 100%; height: 500px; border-radius: 24px; overflow: hidden; position: relative; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const isLocal = window.location.hostname === "127.0.0.1" || window.location.hostname === "localhost";
        // إذا كان مسار الـ API لديك لا يحتوي على كلمة api، احذفها من الرابط أسفل
        const API_BASE_URL = isLocal ? "http://127.0.0.1:5000" : "https://trevo-ai-tourism-tools.onrender.com";

        function App() {
            // States
            const [lang, setLang] = useState(() => localStorage.getItem('tv_lang') || "en");
            const [engineStatus, setEngineStatus] = useState("checking");
            const [activeMenu, setActiveMenu] = useState(() => localStorage.getItem('tv_menu') || "ai-lab");
            const [location, setLocation] = useState(() => localStorage.getItem('tv_loc') || "Aswan, Egypt");
            const [audience, setAudience] = useState(() => localStorage.getItem('tv_aud') || "High Net Worth Individuals");
            const [cost, setCost] = useState(() => localStorage.getItem('tv_cost') || 2000);
            const [revenue, setRevenue] = useState(() => localStorage.getItem('tv_rev') || 15000);
            const [aiContent, setAiContent] = useState(() => localStorage.getItem('tv_content') || "");
            const [roiResult, setRoiResult] = useState(() => localStorage.getItem('tv_roi') || null);
            
            // New States للموبايل والتحميل
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [isGenerating, setIsGenerating] = useState(false);
            const [vrActive, setVrActive] = useState(false);
            const [vrImage, setVrImage] = useState("");

            useEffect(() => {
                document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
                localStorage.setItem('tv_lang', lang);
            }, [lang]);

            useEffect(() => {
                fetch(`${API_BASE_URL}/api/status`)
                    .then(r => r.json())
                    .then(() => setEngineStatus("online"))
                    .catch(() => setEngineStatus("offline"));
                calculateROI(); 
            }, []);

            // تعديل دالة التوليد لإضافة تأثير التحميل وتصحيح الأخطاء
            const generateContent = async (style) => {
                setIsGenerating(true); // تشغيل علامة التحميل
                setAiContent(lang === 'ar' ? "الذكاء الاصطناعي يقوم بكتابة المحتوى الآن، يرجى الانتظار (قد يستغرق السيرفر ثواني ليستيقظ)..." : "AI is generating your content, please wait...");
                
                try {
                    const res = await fetch(`${API_BASE_URL}/api/generate-ai-content`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ location, style, audience })
                    });
                    
                    if (!res.ok) throw new Error("Server Error");
                    
                    const data = await res.json();
                    // تأكد أن مفتاح الاستجابة (copy أو content أو message) مطابق لما يعيده Flask
                    setAiContent(data.copy || data.content || JSON.stringify(data));
                } catch (error) {
                    console.error("Error:", error);
                    setAiContent(lang === 'ar' ? "❌ حدث خطأ في الاتصال بالسيرفر. تأكد أن سيرفر Render يعمل." : "❌ Error connecting to backend server.");
                } finally {
                    setIsGenerating(false); // إيقاف التحميل
                }
            };

            const calculateROI = () => {
                const c = parseFloat(cost) || 1;
                const r = parseFloat(revenue) || 0;
                const localRoi = (((r - c) / c) * 100).toFixed(1);
                setRoiResult(localRoi);
            };

            const menuItems = [
                { id: "dashboard", icon: "ph-squares-four", labelEn: "Dashboard", labelAr: "الرئيسية" },
                { id: "ai-lab", icon: "ph-magic-wand", labelEn: "AI Content Lab", labelAr: "مختبر المحتوى (AI)" },
                { id: "geovr", icon: "ph-virtual-reality", labelEn: "GeoVR Engine", labelAr: "الواقع الافتراضي" },
                { id: "analytics", icon: "ph-chart-line-up", labelEn: "ROI Analytics", labelAr: "تحليل العوائد" },
                { id: "settings", icon: "ph-gear", labelEn: "System Settings", labelAr: "الإعدادات" }
            ];

            const renderContent = () => {
                switch(activeMenu) {
                    case "dashboard":
                    case "ai-lab":
                        return (
                            <div className="bg-white rounded-2xl md:rounded-3xl p-6 md:p-10 shadow-sm border border-slate-200 min-h-[60vh] fade-in">
                                <h2 className="text-2xl md:text-3xl font-black text-trevo-blue mb-6 flex items-center gap-3">
                                    <i className="ph-fill ph-magic-wand text-trevo-orange"></i> 
                                    {lang === 'ar' ? 'مختبر المحتوى' : 'AI Content Lab'}
                                </h2>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-2">{lang === 'ar' ? 'الوجهة السياحية' : 'Primary Destination'}</label>
                                        <input type="text" value={location} onChange={(e) => setLocation(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none focus:border-trevo-orange" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-2">{lang === 'ar' ? 'الجمهور المستهدف' : 'Target Audience'}</label>
                                        <select value={audience} onChange={(e) => setAudience(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700 outline-none">
                                            <option value="High Net Worth Individuals">{lang === 'ar' ? 'أصحاب الثروات (VIP)' : 'High Net Worth Individuals'}</option>
                                            <option value="Adventure Backpackers">{lang === 'ar' ? 'المغامرون' : 'Adventure Backpackers'}</option>
                                            <option value="Family Vacationers">{lang === 'ar' ? 'العائلات' : 'Family Vacationers'}</option>
                                        </select>
                                    </div>
                                </div>

                                {/* إصلاح الأزرار لتتناسب مع الموبايل (Stack on Mobile) */}
                                <div className="flex flex-col md:flex-row gap-3 mb-8 border-b border-slate-200 pb-8">
                                    <button disabled={isGenerating} onClick={() => generateContent('luxury')} className="w-full md:w-auto px-6 py-4 bg-trevo-blue text-white rounded-xl font-bold hover:bg-blue-900 transition-colors disabled:opacity-50 flex justify-center items-center gap-2">
                                        {isGenerating && <i className="ph-bold ph-spinner animate-spin"></i>}
                                        {lang === 'ar' ? 'محتوى فاخر' : 'Generate Luxury'}
                                    </button>
                                    <button disabled={isGenerating} onClick={() => generateContent('adventure')} className="w-full md:w-auto px-6 py-4 bg-slate-100 text-slate-700 rounded-xl font-bold hover:bg-slate-200 transition-colors disabled:opacity-50 flex justify-center items-center gap-2">
                                        {isGenerating && <i className="ph-bold ph-spinner animate-spin"></i>}
                                        {lang === 'ar' ? 'محتوى مغامرات' : 'Generate Adventure'}
                                    </button>
                                    {/* إضافة الزر الثالث المفقود */}
                                    <button disabled={isGenerating} onClick={() => generateContent('budget')} className="w-full md:w-auto px-6 py-4 bg-slate-100 text-slate-700 rounded-xl font-bold hover:bg-slate-200 transition-colors disabled:opacity-50 flex justify-center items-center gap-2">
                                        {isGenerating && <i className="ph-bold ph-spinner animate-spin"></i>}
                                        {lang === 'ar' ? 'محتوى اقتصادي' : 'Generate Budget'}
                                    </button>
                                </div>

                                {aiContent && (
                                    <div className="p-6 md:p-8 border-2 border-dashed border-trevo-orange bg-orange-50 rounded-2xl">
                                        <p className="text-lg md:text-xl font-medium text-slate-800 leading-relaxed whitespace-pre-line">{aiContent}</p>
                                    </div>
                                )}
                            </div>
                        );
                    // ... (باقي الصفحات ستعمل بنفس الكفاءة)
                    default: return <div className="p-10 text-center font-bold text-slate-400">Under Construction</div>;
                }
            };

            return (
                <div className="flex min-h-screen relative bg-[#F8FAFC]">
                    
                    {/* خلفية سوداء شفافة تظهر على الموبايل عند فتح القائمة الجانبية */}
                    {isMobileMenuOpen && (
                        <div className="fixed inset-0 bg-black/50 z-40 md:hidden" onClick={() => setIsMobileMenuOpen(false)}></div>
                    )}

                    {/* القائمة الجانبية: مخفية على الموبايل وتظهر بـ Animation */}
                    <aside className={`fixed top-0 bottom-0 z-50 w-72 bg-trevo-blue text-white flex flex-col shadow-2xl transition-transform duration-300 ease-in-out md:relative md:translate-x-0 ${isMobileMenuOpen ? (lang === 'ar' ? 'translate-x-0 right-0' : 'translate-x-0 left-0') : (lang === 'ar' ? 'translate-x-full right-0' : '-translate-x-full left-0')}`}>
                        <div className="p-6 md:p-8 flex items-center justify-between border-b border-white/10">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 md:w-12 md:h-12 bg-trevo-orange rounded-xl flex items-center justify-center shadow-lg"><span className="text-xl md:text-2xl font-black text-white">T</span></div>
                                <div><h1 className="text-xl md:text-2xl font-black tracking-tight">Trevo AI</h1></div>
                            </div>
                            {/* زر إغلاق القائمة على الموبايل */}
                            <button className="md:hidden text-white" onClick={() => setIsMobileMenuOpen(false)}>
                                <i className="ph-bold ph-x text-2xl"></i>
                            </button>
                        </div>
                        <nav className="flex-1 p-4 space-y-2 mt-4 overflow-y-auto">
                            {menuItems.map(item => (
                                <button key={item.id} onClick={() => { setActiveMenu(item.id); setIsMobileMenuOpen(false); }} className={`w-full flex items-center gap-4 p-4 rounded-xl md:rounded-2xl font-bold transition-all ${activeMenu === item.id ? 'bg-white/10 text-trevo-orange' : 'text-slate-300 hover:bg-white/5 hover:text-white'}`}>
                                    <i className={`ph-fill ${item.icon} text-xl`}></i> {lang === 'ar' ? item.labelAr : item.labelEn}
                                </button>
                            ))}
                        </nav>
                    </aside>

                    {/* المحتوى الرئيسي */}
                    <main className="flex-1 flex flex-col w-full md:w-auto h-screen overflow-y-auto">
                        <header className="bg-white px-4 md:px-10 py-4 md:py-6 border-b border-slate-200 flex justify-between items-center sticky top-0 z-30 shadow-sm">
                            <div className="flex items-center gap-3">
                                {/* زر القائمة (Hamburger) يظهر فقط على الموبايل */}
                                <button className="md:hidden text-trevo-blue p-2" onClick={() => setIsMobileMenuOpen(true)}>
                                    <i className="ph-bold ph-list text-3xl"></i>
                                </button>
                                <h2 className="text-xl md:text-2xl font-black text-trevo-blue capitalize hidden sm:block">
                                    {lang === 'ar' ? menuItems.find(m => m.id === activeMenu)?.labelAr : activeMenu.replace('-', ' ')}
                                </h2>
                            </div>
                            
                            <div className="flex items-center gap-2 md:gap-4">
                                <button onClick={() => setLang(lang === 'en' ? 'ar' : 'en')} className="px-3 md:px-4 py-2 bg-slate-100 text-slate-700 font-bold rounded-lg md:rounded-xl border hover:bg-slate-200 transition-colors text-sm">
                                    {lang === 'en' ? 'العربية' : 'English'}
                                </button>
                                <div className="w-8 h-8 md:w-10 md:h-10 bg-trevo-blue text-white rounded-full flex items-center justify-center font-bold text-xs md:text-sm">SM</div>
                            </div>
                        </header>
                        
                        <div className="p-4 md:p-10 pb-20">
                            {renderContent()}
                        </div>
                    </main>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
