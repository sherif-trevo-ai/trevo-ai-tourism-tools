<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trevo AI | Versions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0F172A; color: white; font-family: sans-serif; }
        .v2-disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center text-center px-4">
    
    <!-- Logo -->
    <div class="w-20 h-20 bg-orange-500 rounded-2xl flex items-center justify-center text-4xl font-black mb-6 shadow-lg shadow-orange-500/20">T</div>
    
    <h1 class="text-4xl font-black mb-2">مشروع Trevo AI</h1>
    <p class="text-slate-400 mb-10 text-lg">اختر الإصدار الذي تود استعراضه</p>

    <div class="flex flex-col md:flex-row gap-6 w-full max-w-2xl">
        <!-- زر الإصدار الأول (النشط حالياً) -->
        <a href="v1/dashboard.html" class="flex-1 px-8 py-6 bg-slate-800 border-2 border-orange-500 rounded-2xl transition-all hover:scale-105 shadow-xl">
            <h2 class="text-2xl font-bold text-orange-500 mb-2">الإصدار 1.0</h2>
            <p class="text-sm text-slate-400 font-medium">لوحة التحكم الكلاسيكية (Classic Dashboard)</p>
            <span class="inline-block mt-4 text-xs bg-orange-500/20 text-orange-500 px-3 py-1 rounded-full text-nowrap">متاح الآن ✅</span>
        </a>

        <!-- زر الإصدار الثاني (متوقف مؤقتاً كما طلبت) -->
        <div class="flex-1 px-8 py-6 bg-slate-900 border-2 border-slate-700 rounded-2xl v2-disabled relative overflow-hidden grayscale">
            <h2 class="text-2xl font-bold text-slate-500 mb-2">الإصدار 2.0</h2>
            <p class="text-sm text-slate-500 font-medium text-nowrap">الموقع الجديد (قريباً جداً)</p>
            <span class="inline-block mt-4 text-xs bg-slate-700 text-slate-400 px-3 py-1 rounded-full">قيد التجهيز 🛠️</span>
        </div>
    </div>

    <footer class="mt-20 text-slate-500 text-sm">
        &copy; 2024 Trevo AI - جميع الحقوق محفوظة
    </footer>

</body>
</html>
